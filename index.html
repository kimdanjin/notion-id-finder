<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Data Source finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 border border-slate-100">
        <div class="flex items-center gap-3 mb-6">
            <div class="bg-black p-2 rounded-lg">
                <i data-lucide="database" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800">Notion finder</h1>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">Integration Token (API Key)</label>
                <input type="password" id="apiKey" placeholder="secret_..." 
                    class="w-full px-4 py-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 transition-all outline-none text-slate-700">
            </div>

            <button onclick="getNotionData()" id="btn"
                class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                <span id="btnText">데이터베이스 조회</span>
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </div>

        <div id="resultContainer" class="hidden mt-8 pt-6 border-t border-dashed border-slate-200">
            <p class="text-xs font-bold text-blue-600 mb-4 uppercase tracking-wider">Connected Databases</p>
            <div id="dbList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function getNotionData() {
            const apiKey = document.getElementById('apiKey').value;
            const btn = document.getElementById('btn');
            const btnText = document.getElementById('btnText');
            const resultContainer = document.getElementById('resultContainer');
            const dbList = document.getElementById('dbList');

            if (!apiKey) {
                alert('API 키를 입력해주세요!');
                return;
            }

            btn.disabled = true;
            btnText.innerText = '조회 중...';
            dbList.innerHTML = '';

            try {
                const response = await fetch('https://zzss1004.dothome.co.kr/api/notion_proxy.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: apiKey })
                });

                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    resultContainer.classList.remove('hidden');
                    data.results.forEach(db => {
                        const item = document.createElement('div');
                        item.className = "p-4 bg-blue-50 rounded-xl border border-blue-100";
                        item.innerHTML = `
                            <p class="text-sm font-bold text-blue-900 mb-1">${db.title}</p>
                            <div class="flex items-center justify-between gap-2">
                                <code class="text-xs font-mono text-blue-700 break-all">${db.id}</code>
                                <button onclick="copyText('${db.id}')" class="p-1 hover:bg-blue-200 rounded">
                                    <i data-lucide="copy" class="w-3 h-3 text-blue-600"></i>
                                </button>
                            </div>
                        `;
                        dbList.appendChild(item);
                    });
                    lucide.createIcons();
                } else {
                }
            } catch (err) {
                alert('오류 발생: ' + err.message);
            } finally {
                btn.disabled = false;
                btnText.innerText = '데이터베이스 조회';
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
        }
    </script>
</body>
</html>
